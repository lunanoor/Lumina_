<html lang="em">
<head>
    <meta charset="UTF-8">
    <meta name="'viewport" content="'width-device-width, initial-scale=1.0">
    <title> Lumina Your magical companion</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vanilla: #fff7e6;
            --blush: #f7c8d3;
            --rosewood: #b46a72;
            --sage-leaf: #a8b58a;
            --misty-sky: #a9b7c6;
            --midnight: #2d3a47;
            --gold: #f7d98b;
            --midnightblack: #0d0d1a;
            --deep: #12122a;
            --card: #rgba(255,255,255,0.06);
            --card-hover: rgba(255,255,255,0.10);
            --border: rgba(200,180,255,0.18);
            --text: #f0eaff;
            --text-muted: rgba(210,195,255,0.65);
            --glow-purple: rgba(180,140,255,0.25);
            --glow-gold: rgba(247,217,139,0.2);

        }
* { margin:0; padding:0; box-sizing:border-box;}

body {
    font-family: 'Quicksand', sans-serif;
    background: var(--midnight);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;

}
#starfield {
    position: fixed; top:0; left:0; width:100%; height:100%;
    pointer-events: non; z-index: 0;
    overflow: hidden;

}

.star {
    position: absolute; border-radius: 50%;
    background: white opacity: 0;
    animation: twinkle var(--dur, 3s) var(--delay, 0s) infinite;

}
@keyframes twinkle {
    0%, 100% { opacity:0; transform: scale(1); }
    50% { opacity: var(--op, 0.8); transform: scale(1.3); }

}

.nebula {
    position: fixed; border-radius: 50%; filter: blur(80px);
    pointer-events: none; z-index: 0; opacity: 0.15;

}

#app {
    position: relative; z-index: 1;
    max-width: 420px; margin: 0 auto;
    min-height: 100vh;
    display: flex; flex-direction: column;

}

.cursor-sparkle {
    position: fixed; pointer-events: none; z-index: 999;
    width: 6px; height: 6px; border-radius: 50%;
    animation: sparkle-out 0.6s ease-out forwards;

}
@keyframes sparkle-out {
    0% { opacity:1; transform: scale(1) translate(0,0);}
    100% { opacity:0; transform: scale(0) translate(var(--dx), var(--dy));}

}

.screen { display:none; flex-direction:column; flex:1; padding: 00 80px;}
.screen.active { display:flex; animation: faden 0.4s ease;}
@keyframes fadeIn { from {opacity:0; transform: translateY(12px); } to {opacity:1; transform:none;}

}

#nav {
    position: fixed; bottom: 0; left: 50%; transform: translate(-50%);
    width: 100%; max-width: 420px;
    background: rgba(13,13,26,0.92);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; align-items: center;
    padding: 10px 0 16px; z-index: 100;
}

.nav-btn .nav-icon { font-size: 22px; line-height:1; }
.nav-btn.active {color: var(--lavender); }
.nav-btn.active .nav-icon { filter: drop-shadow(0 0 6px var(--lavender)); }

.screen-header {
    padding: 52px 20px 16px;
    display: flex; align-items: center; justify-content: space-between;
}

.screen-title {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(135deg, var(--lavender), var(--gold)); 
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
}

.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px 18px;
    margin: 0 16px 12px;
    transition: all 0.2s;

}

.card:hover { background: var(--card-hover); border-color: rgba(200,180,255,0.3); }

#home-greeting {
    padding: 56px 20px 4px;
    text-align: center;

}

.greeting-time {
    font-size: 13px; color: var(--text-muted); letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 6px;
}

.greeting-name {
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, #e8deff, var(--lavender), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
}

.greeting-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

.stats.row {
    display: flex; gap: 10px; margin: 16px 16px 0;
}

.stat-chip {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 12px; text-align:center;

}

.stat-chip .val { font-size: 20px; font-weight: 700; }
.stat-chip .ibl { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

#pet-area {
    margin: 12px 16px; background: var(--card) border: 1px solid var(--border);
    border-radius: 22px; padding: 16px; display:flex; align-items:center; gap: 14px;
    cursor: pointer; transition: all 0.2s;

}

#pet-area: hover { background: var(--card-hover); }
#pet-canvas { width: 80px; height: 80px; flex-shrink: 0; }
.pet-info .pet-name { font-size: 16px; font-weight: 700; }
.pet-info .pet-mood { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.pet-xp-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 8px; overflow:hidden; }

.pet-xp-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--lavender), var(--gold)); transition: width 0.5s }
.mood-row { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 2px; scrollbar-width: none; }
.mood-btn {
    flex-shrink: 0; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 12px; cursor: pointer;
    font-family: 'Quickstand', sans-serif; color: var(--text-muted); font-size: 12px;
    transition: all 0.2s; display: flex; flex-direction:column; align-items:center;
    gap:2px;
}

.mood-btn .me { font-size: 20px; }
.mood-btn:hover, .mood-btn.selected { border-color: var(--lavender); color: var(--lavender); background: rgba(180, 140,255,0.1);}

.goal-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid rgba(200,180,255,0.08);

}

.goal-item: last-child { border-bottom: none;}
.goal-check { 
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid var(--border); background: none;
    cursor: pointer; flex-shrink:0; transition: all 0.2s
    display:flex; align-items:center; justify-content:center;

}

.goal-check.done { background: var(--lavender); border-color: var(--lavender);}
.goal-check.done::after { content: '✔️'; font-size: 11px; color: white; }
.goal-text { font-size: 13px; flex: 1; }
.goal-text.done { text-decoration: line-through; color: var(--text-muted); }

.section-label {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-muted); margin: 16px 20px 8px;

}

#chat-messages {
    flex: 1; overflow-y: auto; padding: 16px 16px 0;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thing; scrollbar-color: var(--border) transparent;

}

.msg-wrap { display: flex; gap: 8px; animation: msgIn 0.3s ease; }
@keyframes msgIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
.msg-wrap.user { flex-direction: row-reverse; }
msg-avatar {
    width: 30px; height: 30px; border-radius: 50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size: 14px;
    background: linear-gradient(135deg, var(--lavender-dark), var(--rose));
}

.msg-bubble { 
    max-width: 78%; padding: 10px 14px;
    border-radius: 18px; font-size: 14px; line-height: 1.5;
    position: relative;
}

.msg-wrap.lumina .msg-bubble {
    background: linear-gradient(135deg, rgba(180, 140, 255, 0.35), rgba(245, 184, 208, 0.25));
    border: 1px solid rgba(180, 140, 255, 0.3);
    border-radius: 18px 4px 18px 18px;

}

.msg-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

.typing-dots { display:flex; gap:4px; padding: 4px 0; }
.typing-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--lavender); opacity: 0.5;
    animation: dot-bounce 1.2s infinite;
}

.typing-dots span:nth-child(2) {animation-delay: 0.2s; }
.typing-dots span:nth-child(3) {animation-delay: 0.4s; }
@keyframes dot-bounce { 0%,80%,100%{transform:none; } 40%{transform:translateY(-5px); opacity:1; } }

#chat-input-area { 
    padding: 12px 16px 16px; display: flex; gap: 10px; align-items: flec-end;

}

#chat-input {
    flex: 1; background: rgba(255, 255, 255, 0.07); border: 1px solid var(--border);
    border-radius: 20px; padding: 10px 16px; color: var(--text);
    font-family: 'Quicksand', sans-serif; font-size: 14px; resize: none;
    outline: none; transition: border-color 0.2s; line-height: 1.4;
    max-height: 100px;
}

#chat-input:focus { border-color: var(--lavender); }
#chat-input::placeholder { color: var(--text-muted); }
#send-btn {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, var(--lavender-dark), var(--rose));
    border: none; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s; box-shadow: 0 0 16px rgba(180, 100, 255, 0.4);

}

#send-btn:hover { transform: scale(0.18); }
#send-btn:active { transform: scale(0.95); }

#pet-big-canvas {
    width: 200px; height: 200px; margin: 0 auto; display:block;
    animation: float 3s ease-in-out infinite;
}

@keyframes float { 0%, 100% { transform: translateY(0); } 50% {transform: translateY(-10px); } }
.pet-actions { display:flex; gap:10px; padding: 0 16px; flex-wrap:wrap; }
.pet-action-btn {
    flex: 1; min-width: 80px; background: var(--card); border: 1px solid var(--bprder);
    border-radius: 14px; padding: 12px 18px; cursor:pointer; text-align:center;
    font-family: 'Quicksand', sans-serif; color: var(--text); font-size: 12px;
    transition: all 0.2s;

}


    </style>
</head>

</html>
